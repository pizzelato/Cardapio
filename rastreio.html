<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pizzelato — Rastrear Pedido</title>
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --fire:#C0692B; --fire2:#D47A3A; --fire3:#E8904A;
  --green:#16a34a; --green2:#22c55e;
  --black:#080808; --dark:#111; --dark2:#181818; --dark3:#202020;
  --dark4:#2A2A2A; --gray:#555; --gray2:#888; --white:#F4F1ED;
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body {
  background:var(--black); color:var(--white);
  font-family:'Montserrat',sans-serif;
  min-height:100vh; padding:0 0 40px;
  overflow-x:hidden;
}

/* ─ TOP BAR ─ */
.topbar {
  position:sticky; top:0; z-index:10;
  background:rgba(8,8,8,.96); backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,.06);
  padding:14px 20px;
  display:flex; align-items:center; justify-content:space-between;
}
.topbar-logo { display:flex; align-items:center; gap:8px; }
.topbar-logo svg { width:24px; height:30px; }
.topbar-brand { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:4px; }
.topbar-sub { font-size:8px; letter-spacing:2px; color:var(--fire); text-transform:uppercase; font-weight:700; }
.live-badge {
  display:flex; align-items:center; gap:5px;
  background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.25);
  border-radius:20px; padding:5px 10px;
  font-size:10px; font-weight:700; color:var(--green2); letter-spacing:.5px;
}
.live-dot { width:5px; height:5px; border-radius:50%; background:var(--green2); animation:livepulse 1.4s infinite; }
@keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}

/* ─ HERO STATUS ─ */
.hero-status {
  padding:36px 20px 28px; text-align:center; position:relative; overflow:hidden;
}
.hero-status::before {
  content:''; position:absolute; top:-60px; left:50%; transform:translateX(-50%);
  width:300px; height:200px;
  background:radial-gradient(ellipse,rgba(192,105,43,.12),transparent 70%);
  pointer-events:none; transition:background .5s;
}
.hero-status.verde::before { background:radial-gradient(ellipse,rgba(34,197,94,.12),transparent 70%); }

.status-icon-wrap {
  position:relative; display:inline-block; margin-bottom:16px;
}
.status-icon {
  font-size:72px; display:block; line-height:1;
  animation:iconIn .5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes iconIn{from{transform:scale(0) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

/* Anel pulsante no status atual */
.pulse-ring {
  position:absolute; inset:-8px;
  border-radius:50%; border:2px solid var(--fire);
  opacity:0; animation:ringPulse 2s ease-in-out infinite;
}
.verde .pulse-ring { border-color:var(--green2); }
@keyframes ringPulse{0%{transform:scale(.8);opacity:.6}100%{transform:scale(1.3);opacity:0}}

.status-label {
  font-family:'Bebas Neue',sans-serif; font-size:34px; letter-spacing:3px;
  margin-bottom:8px; transition:color .4s;
}
.status-sub { font-size:13px; color:var(--gray2); line-height:1.6; max-width:280px; margin:0 auto; }

/* ─ LINHA DO TEMPO ─ */
.timeline-wrap { padding:8px 20px 0; max-width:500px; margin:0 auto; }

.steps {
  display:flex; align-items:flex-start; position:relative;
  padding:0 4px; margin-bottom:6px;
}
.step { display:flex; flex-direction:column; align-items:center; flex:1; position:relative; z-index:1; }
.step-circle {
  width:40px; height:40px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:800; flex-shrink:0;
  transition:all .4s cubic-bezier(0.34,1.2,0.64,1);
  position:relative;
}
.step-circle.feita {
  background:var(--fire); color:#fff;
  box-shadow:0 0 0 4px rgba(192,105,43,.15);
}
.step-circle.feita.verde-cor {
  background:var(--green); box-shadow:0 0 0 4px rgba(22,163,74,.15);
}
.step-circle.atual {
  background:var(--fire2); color:#fff;
  box-shadow:0 0 0 6px rgba(212,122,58,.2);
  animation:stepPulse 1.8s ease-in-out infinite;
}
.step-circle.atual.verde-cor {
  background:var(--green2); box-shadow:0 0 0 6px rgba(34,197,94,.2);
}
@keyframes stepPulse{
  0%,100%{box-shadow:0 0 0 6px rgba(212,122,58,.2)}
  50%    {box-shadow:0 0 0 12px rgba(212,122,58,.0)}
}
.step-circle.futura {
  background:rgba(255,255,255,.06); color:var(--gray2);
  border:1.5px solid rgba(255,255,255,.1);
}
.step-label {
  font-size:9px; font-weight:700; letter-spacing:.8px; text-transform:uppercase;
  margin-top:6px; text-align:center; color:var(--gray2);
  transition:color .4s; line-height:1.3;
}
.step-label.ativa { color:var(--fire2); }
.step-label.verde-txt { color:var(--green2); }

/* Linha de conexão */
.step-connector {
  flex:1; height:3px; margin-top:18px; border-radius:2px;
  background:rgba(255,255,255,.08);
  transition:background .5s ease;
  position:relative; overflow:hidden;
}
.step-connector.feita { background:var(--fire); }
.step-connector.feita.verde-cor { background:var(--green); }
/* Animação de preenchimento */
.step-connector.feita::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,rgba(255,255,255,.3),transparent);
  animation:connFill .6s ease both;
}
@keyframes connFill{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* Horários das etapas */
.step-times { display:flex; padding:0 4px; margin-bottom:28px; }
.step-time { flex:1; text-align:center; font-size:10px; color:var(--gray2); font-weight:600; }
.step-time.ok { color:rgba(244,241,237,.6); }

/* ─ CARDS ─ */
.cards-wrap { padding:0 16px; max-width:500px; margin:0 auto; display:flex; flex-direction:column; gap:12px; }

.card {
  background:linear-gradient(135deg,var(--dark2),var(--dark));
  border:1px solid rgba(255,255,255,.06); border-radius:18px; padding:18px 20px;
  animation:cardIn .4s cubic-bezier(0.4,0,0.2,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.card-title {
  font-size:9px; font-weight:800; letter-spacing:2px; color:var(--fire);
  text-transform:uppercase; margin-bottom:14px;
}

/* Info rows */
.info-row { display:flex; justify-content:space-between; align-items:flex-start; padding:8px 0; border-bottom:1px solid rgba(255,255,255,.05); gap:12px; }
.info-row:last-child { border:none; padding-bottom:0; }
.info-lbl { font-size:12px; color:var(--gray2); flex-shrink:0; }
.info-val { font-size:12px; font-weight:700; color:var(--white); text-align:right; }

/* Itens do pedido */
.itens-list { display:flex; flex-direction:column; gap:6px; }
.item-row {
  display:flex; align-items:center; gap:10px;
  background:rgba(255,255,255,.03); border-radius:10px; padding:8px 10px;
}
.item-ico { font-size:20px; flex-shrink:0; }
.item-nome { font-size:12px; font-weight:700; }
.item-cat { font-size:10px; color:var(--gray2); margin-top:1px; }

/* Card entregue */
.card-entregue {
  background:linear-gradient(135deg,rgba(22,163,74,.08),rgba(22,163,74,.03));
  border-color:rgba(22,163,74,.2); text-align:center; padding:24px 20px;
}
.card-entregue .entregue-ico { font-size:48px; margin-bottom:10px; animation:iconIn .5s .1s both; }
.card-entregue h3 { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:2px; margin-bottom:6px; color:var(--green2); }
.card-entregue p { font-size:12px; color:var(--gray2); line-height:1.6; margin-bottom:16px; }

/* Card avaliação */
.card-aval {
  background:linear-gradient(135deg,rgba(192,105,43,.08),rgba(192,105,43,.03));
  border-color:rgba(192,105,43,.2); text-align:center; padding:20px;
}
.card-aval p { font-size:12px; color:var(--gray2); margin-bottom:14px; line-height:1.6; }

/* Botões */
.btn-pedir {
  display:inline-flex; align-items:center; gap:8px;
  background:var(--fire); color:#fff; border:none; border-radius:12px;
  padding:12px 22px; font-size:13px; font-weight:700; cursor:pointer;
  text-decoration:none; transition:all .2s;
}
.btn-pedir:hover { background:var(--fire2); transform:translateY(-1px); }

.btn-avaliar {
  width:100%; background:linear-gradient(135deg,var(--fire),var(--fire2));
  border:none; border-radius:12px; padding:13px;
  font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:2px;
  color:#fff; cursor:pointer; transition:all .2s; text-decoration:none;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 4px 16px rgba(192,105,43,.35);
}
.btn-avaliar:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(192,105,43,.5); }

.btn-wa {
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%; padding:14px;
  background:rgba(37,211,102,.1); border:1.5px solid rgba(37,211,102,.25);
  border-radius:14px; color:#25d366;
  font-size:14px; font-weight:700; cursor:pointer; text-decoration:none;
  transition:all .2s;
}
.btn-wa:hover { background:rgba(37,211,102,.18); }

/* Loading / Erro */
.loading {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:60vh; gap:14px; text-align:center; padding:20px;
}
.loading-spinner {
  width:48px; height:48px; border-radius:50%;
  border:3px solid rgba(192,105,43,.15); border-top-color:var(--fire);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p { font-size:13px; color:var(--gray2); }

.erro-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; padding:24px; text-align:center; gap:10px; }
.erro-ico { font-size:56px; opacity:.4; }
.erro-wrap h3 { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:2px; }
.erro-wrap p { font-size:13px; color:var(--gray2); line-height:1.6; }

/* Footer */
.footer-txt { text-align:center; font-size:10px; color:var(--gray); letter-spacing:1px; margin-top:20px; padding:0 20px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">
    <svg viewBox="0 0 60 70" fill="none">
      <path d="M30 1C27 7 21 11 23 18C25 23 29 21 29 27C29 32 22 35 24 41C26 46 34 44 36 38C40 29 34 22 38 15C41 10 46 13 44 20C47 16 52 11 48 5C44 0 38 4 34 8C32 4 32 1 30 1Z" fill="#C0692B"/>
      <line x1="4" y1="42" x2="22" y2="42" stroke="#C0692B" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="38" y1="42" x2="56" y2="42" stroke="#C0692B" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M14 44L30 68L46 44Z" fill="none" stroke="#C5C0BA" stroke-width="2.2" stroke-linejoin="round"/>
    </svg>
    <div>
      <div class="topbar-brand">PIZZELATO</div>
      <div class="topbar-sub">Urban Pizza Cone</div>
    </div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>AO VIVO</div>
</div>

<!-- CONTEÚDO DINÂMICO -->
<div id="conteudo">
  <div class="loading">
    <div class="loading-spinner"></div>
    <p>Buscando seu pedido...</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const fb = initializeApp({
  apiKey:"AIzaSyCfts7IfOB7eajaSoI-x1zsi8lRo3NDO70",
  authDomain:"pizzelato-98e7c.firebaseapp.com",
  projectId:"pizzelato-98e7c",
  storageBucket:"pizzelato-98e7c.firebasestorage.app",
  messagingSenderId:"33999376460",
  appId:"1:33999376460:web:02646aa054832484e464e9"
});
const db = getFirestore(fb);

const params  = new URLSearchParams(location.search);
const vendaId = params.get('rastreio') || params.get('id') || '';

const STATUS = {
  novo:     { ico:'📋', label:'Pedido Recebido',    sub:'Recebemos seu pedido! Em instantes começa o preparo.', cor:'var(--gray2)',  verde:false },
  preparo:  { ico:'🍕', label:'Em Preparo',          sub:'Seu cone está sendo feito com muito carinho. 🔥',        cor:'var(--fire2)', verde:false },
  rota:     { ico:'🛵', label:'Saiu para Entrega',   sub:'O entregador está a caminho — fome aguçada! 🛵',         cor:'var(--fire3)', verde:false },
  entregue: { ico:'✅', label:'Entregue!',            sub:'Aproveite muito! Volte sempre. 🍕',                      cor:'var(--green2)',verde:true  }
};
const ORDEM  = ['novo','preparo','rota','entregue'];
const NOMES  = ['Recebido','Preparo','A caminho','Entregue'];
const ICOS   = ['📋','🍕','🛵','✅'];

function fmtHora(ts){
  if(!ts) return null;
  const d = new Date(ts);
  // Ajuste BRT (UTC-3)
  const brt = new Date(d.getTime() - 3*60*60*1000);
  return String(brt.getUTCHours()).padStart(2,'0') + ':' + String(brt.getUTCMinutes()).padStart(2,'0');
}

function abreviarNome(nome){
  if(!nome) return '—';
  const p = nome.trim().split(/\s+/);
  if(p.length <= 1) return p[0];
  return p[0] + ' ' + p.slice(1).map(x=>x[0].toUpperCase()+'.').join(' ');
}

let _statusAnterior = null;

function render(ped){
  const status  = ped.status || 'novo';
  const s       = STATUS[status] || STATUS.novo;
  const iAtual  = ORDEM.indexOf(status);
  const verde   = s.verde;
  const cont    = document.getElementById('conteudo');

  // Notificação de mudança de status
  if(_statusAnterior && _statusAnterior !== status){
    if('vibrate' in navigator) navigator.vibrate([200,100,200]);
  }
  _statusAnterior = status;

  // Timestamps
  const ts = {
    novo:     ped.tsStatus?.novo     || ped.ts_novo,
    preparo:  ped.tsStatus?.preparo  || ped.ts_preparo,
    rota:     ped.tsStatus?.rota     || ped.ts_rota,
    entregue: ped.tsStatus?.entregue || ped.ts_entregue
  };

  // ── STEPS ──
  const stepsHTML = ORDEM.map((e,i)=>{
    const feita  = i < iAtual;
    const atual  = i === iAtual;
    const futura = i > iAtual;
    const cls    = feita?'feita':atual?'atual':'futura';
    const vcor   = verde && (feita||atual) ? ' verde-cor' : '';
    const vlbl   = verde && (feita||atual) ? ' verde-txt' : atual ? ' ativa' : '';
    const connector = i < ORDEM.length-1 ? `<div class="step-connector ${feita?'feita':'futura'}${vcor}"></div>` : '';
    return `
      <div class="step">
        <div class="step-circle ${cls}${vcor}">${feita?'✓':ICOS[i]}</div>
        <div class="step-label${vlbl}">${NOMES[i]}</div>
      </div>
      ${connector}`;
  }).join('');

  // Horários por etapa
  const timesHTML = ORDEM.map((e,i)=>{
    const hora = i <= iAtual ? fmtHora(ts[e]) : null;
    return `<div class="step-time${hora?' ok':''}">${hora||'—'}</div>`;
  }).join('');

  // ── ITENS ──
  const itensArr = (ped.itens||'').split(',').map(s=>s.trim()).filter(Boolean);
  const itensHTML = itensArr.length
    ? `<div class="itens-list">${itensArr.map(it=>{
        const match = it.match(/^(\d+)x\s*(.+)$/i);
        const qtd  = match ? match[1]+'x' : '';
        const nome = match ? match[2] : it;
        return `<div class="item-row"><div class="item-ico">🍕</div><div><div class="item-nome">${qtd} ${nome}</div></div></div>`;
      }).join('')}</div>`
    : `<div style="font-size:12px;color:var(--gray2)">${ped.itens||'—'}</div>`;

  // ── CARD ENTREGUE ──
  const cardEntregueHTML = status === 'entregue' ? `
    <div class="card card-entregue">
      <div class="entregue-ico">🎉</div>
      <h3>CHEGOU!</h3>
      <p>Esperamos que você curta cada mordida!<br>A cada 5 pedidos você ganha <strong style="color:var(--green2)">1 cone grátis</strong>.</p>
      <a href="https://pizzelato.github.io/Cardapio/" class="btn-pedir">🍕 Pedir de novo</a>
    </div>
    <div class="card card-aval">
      <div class="card-title">⭐ Sua Opinião</div>
      <p>Como foi a experiência? Deixe uma avaliação — leva 30 segundos e ajuda muito!</p>
      <a href="https://pizzelato.github.io/Cardapio/avaliacao.html?pedido=${vendaId}" class="btn-avaliar">⭐ AVALIAR MEU PEDIDO</a>
    </div>` : '';

  cont.innerHTML = `
    <div class="hero-status${verde?' verde':''}">
      <div class="status-icon-wrap">
        <span class="status-icon">${s.ico}</span>
        <div class="pulse-ring"></div>
      </div>
      <div class="status-label" style="color:${s.cor}">${s.label}</div>
      <div class="status-sub">${s.sub}</div>
    </div>

    <div class="timeline-wrap">
      <div class="steps">${stepsHTML}</div>
      <div class="step-times">${timesHTML}</div>
    </div>

    <div class="cards-wrap">

      <div class="card" style="animation-delay:.05s">
        <div class="card-title">📦 Seu Pedido</div>
        ${itensHTML}
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:11px;color:var(--gray2)">Feito em</span>
          <span style="font-size:12px;font-weight:700">${ped.hora || fmtHora(ped.ts) || '—'}</span>
        </div>
        <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:11px;color:var(--gray2)">Cliente</span>
          <span style="font-size:12px;font-weight:700">${abreviarNome(ped.cliente)}</span>
        </div>
        <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:11px;color:var(--gray2)">Pagamento</span>
          <span style="font-size:12px;font-weight:700">${(()=>{
            const pg = (ped.pagamento||ped.pgto||'').toLowerCase();
            if(pg.includes('pix'))     return '💠 PIX';
            if(pg.includes('din'))     return '💵 Dinheiro';
            if(pg.includes('deb'))     return '💳 Débito';
            if(pg.includes('cred'))    return '💳 Crédito';
            if(pg.includes('cart'))    return '💳 Cartão';
            return pg ? pg.charAt(0).toUpperCase()+pg.slice(1) : '—';
          })()}</span>
        </div>
      </div>

      ${cardEntregueHTML}

      <a href="https://wa.me/5579996508292" class="btn-wa" target="_blank" style="animation-delay:.1s">
        💬 Falar com a Pizzelato
      </a>

      <div class="footer-txt">
        Atualização em tempo real · Pizzelato Urban Pizza Cone
      </div>
    </div>`;
}

// ── LINK INVÁLIDO ──
if(!vendaId){
  document.getElementById('conteudo').innerHTML = `
    <div class="erro-wrap">
      <div class="erro-ico">🔍</div>
      <h3>LINK INVÁLIDO</h3>
      <p>O link de rastreio não foi encontrado.<br>Verifique o link enviado pela Pizzelato.</p>
      <a href="https://wa.me/5579996508292" class="btn-wa" target="_blank" style="max-width:300px;margin-top:8px">💬 Falar com a Pizzelato</a>
    </div>`;
} else {
  // Escutar mudanças em tempo real
  onSnapshot(doc(db,'rastreio',vendaId), snap=>{
    if(snap.exists()){
      render(snap.data());
    } else {
      document.getElementById('conteudo').innerHTML = `
        <div class="erro-wrap">
          <div class="erro-ico">⏳</div>
          <h3>AGUARDANDO</h3>
          <p>O rastreamento fica disponível assim que o pedido entrar em preparo.<br><br>Fique de olho no WhatsApp!</p>
          <a href="https://wa.me/5579996508292" class="btn-wa" target="_blank" style="max-width:300px;margin-top:8px">💬 Falar com a Pizzelato</a>
        </div>`;
    }
  });
}
</script>
</body>
</html>
